name: Quality Gates

on:
  push:
  pull_request:

jobs:
  docs-system-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run quality gate
        run: python scripts/quality_gate.py

      - name: Run retrieval eval
        run: python scripts/eval_tool_retrieval.py

      - name: Run token-tax self-test (offline)
        run: python scripts/token_tax.py --selftest

      - name: Run agentsmd-lint self-test (offline)
        run: python scripts/agentsmd_lint.py --selftest

      - name: Lint this repo's own AGENTS.md
        run: python scripts/agentsmd_lint.py . --strict

  agent-readability-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/agent-readability
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dev dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Validate llms.txt against corpus
        run: npm run validate

