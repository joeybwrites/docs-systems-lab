name: Quality Gates

on:
  push:
  pull_request:

jobs:
  docs-system-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run quality gate
        run: python scripts/quality_gate.py

      - name: Run retrieval eval
        run: python scripts/eval_tool_retrieval.py

